<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js"></script>
</head>
<body onload="loadCustomerDashboard()">

  <div class="dashboard">
    <div class="sidebar">
      <h2>Customer Panel</h2>
      <p id="custName"></p>
      <a href="index.html" class="logout-btn">Logout</a>
    </div>

    <div class="main-panel">
      <div class="top-tabs">
        <div class="tab active">Transactions</div>
        <div class="tab">Offers</div>
        <div class="tab">Support</div>
        <div class="tab">Account Detail</div>
      </div>

      <div class="content-grid">
        <div class="card">
          <h3>Account Detail</h3>
          <div id="customerDetails"></div>
        </div>

        <div class="card">
          <h3>Quick Actions</h3>
          <button onclick="viewBalance()">View Balance</button>
          <button onclick="miniStatement()">Mini Statement</button>
          <button onclick="downloadPassbook()">Download Passbook</button>

          <hr><br>

          <h4>Add Self Money to Account</h4>
          <input id="depositAmount" placeholder="Enter Amount">
          <button onclick="depositMoney()">Add Money</button>
        </div>

        <div class="card">
          <h3>Offers</h3>
          <p>Personal Loan Offer</p>
          <p>Credit Card Upgrade</p>
          <p>Cashback Offer</p>
        </div>

        <div class="card">
          <h3>Support</h3>
          <p>Customer Care: 1800-000-123</p>
          <p>Email: support@bank.com</p>
          <p>Branch Help Available</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
