<!DOCTYPE html>
<html>
<head>
  <title>Employee Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-bg">

  <div class="login-card">
    <h1>Bank Employee Login</h1>

    <input id="empUser" placeholder="Employee Username">
    <input id="empPass" type="password" placeholder="Password">

    <button onclick="employeeLogin()">Login</button>
    <br><br>
    <a href="index.html">Back</a>
  </div>

  <script>
    function employeeLogin() {
      let u = document.getElementById("empUser").value;
      let p = document.getElementById("empPass").value;

      if (u === "employee" && p === "1234") {
        window.location = "employee-dashboard.html";
      } else {
        alert("Wrong Employee Login");
      }
    }
  </script>

</body>
</html>
